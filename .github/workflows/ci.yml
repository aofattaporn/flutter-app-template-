name: CI - Analyze & Test

on:
  push:
    branches: [develop]
  pull_request:
    branches: [master]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create .env file
        working-directory: apps/budget_wise_app
        run: |
          cat <<EOF > .env
          DEBUG=true
          BACKEND_TYPE=supabase
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          EOF

      - name: Install dependencies
        working-directory: apps/budget_wise_app
        run: flutter pub get

      - name: Analyze
        working-directory: apps/budget_wise_app
        run: dart analyze lib --fatal-infos=false --fatal-warnings

      - name: Test
        working-directory: apps/budget_wise_app
        run: flutter test

  build-web:
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create .env file
        working-directory: apps/budget_wise_app
        run: |
          cat <<EOF > .env
          DEBUG=true
          BACKEND_TYPE=supabase
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          EOF

      - name: Install dependencies
        working-directory: apps/budget_wise_app
        run: flutter pub get

      - name: Build web (verify)
        working-directory: apps/budget_wise_app
        run: flutter build web --release --base-href "/budgetwwise-app/"
